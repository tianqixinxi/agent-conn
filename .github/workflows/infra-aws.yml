name: AWS infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: Create a reviewable plan or apply a plan from a successful run
        required: true
        type: choice
        options:
          - plan
          - apply
      plan_run_id:
        description: Successful plan workflow run ID; required for apply
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: agent-comm-production-infra
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_IN_AUTOMATION: "true"
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_VAR_project_name: ${{ vars.AGENT_COMM_PROJECT }}
  TF_VAR_environment: ${{ vars.AGENT_COMM_ENVIRONMENT }}
  TF_VAR_domain_name: ${{ vars.AGENT_COMM_DOMAIN }}
  TF_VAR_route53_zone_id: ${{ vars.ROUTE53_ZONE_ID }}
  TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
  TF_VAR_cloudflare_proxied: ${{ vars.CLOUDFLARE_PROXIED || 'true' }}
  TF_VAR_enable_a2a_ingress: ${{ vars.ENABLE_A2A_INGRESS || 'false' }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  plan:
    name: Terraform plan
    if: inputs.action == 'plan'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ vars.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: agent-comm-terraform-plan
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.15.8
      - name: Initialize Terraform
        working-directory: deploy/aws/terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"
      - run: terraform fmt -check
        working-directory: deploy/aws/terraform
      - run: terraform validate
        working-directory: deploy/aws/terraform
      - name: Create plan
        working-directory: deploy/aws/terraform
        run: terraform plan -input=false -out=agent-comm.tfplan > plan.txt
      - name: Summarize plan without publishing infrastructure details
        working-directory: deploy/aws/terraform
        run: |
          terraform show -json agent-comm.tfplan \
            | jq -r '
                [.resource_changes[]?.change.actions | join("/")]
                | group_by(.)
                | map("- \(.[0]): \(length)")
                | if length == 0 then "- no changes" else .[] end
              ' >> "$GITHUB_STEP_SUMMARY"
      - name: Store exact plan in the private Terraform state bucket
        working-directory: deploy/aws/terraform
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          PLAN_KEY="plans/${GITHUB_SHA}/${GITHUB_RUN_ID}.tfplan"
          aws s3 cp agent-comm.tfplan "s3://${TF_STATE_BUCKET}/${PLAN_KEY}" --sse AES256
          echo "Plan run ID: ${GITHUB_RUN_ID}" >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: Terraform apply reviewed plan
    if: inputs.action == 'apply'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Require a plan run ID
        env:
          PLAN_RUN_ID: ${{ inputs.plan_run_id }}
        run: test -n "$PLAN_RUN_ID"
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Verify plan provenance
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN_RUN_ID: ${{ inputs.plan_run_id }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          RUN=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${PLAN_RUN_ID}")
          test "$(jq -r .name <<<"$RUN")" = "AWS infrastructure"
          test "$(jq -r .event <<<"$RUN")" = "workflow_dispatch"
          test "$(jq -r .conclusion <<<"$RUN")" = "success"
          test "$(jq -r .head_branch <<<"$RUN")" = "main"
          test "$(jq -r .head_sha <<<"$RUN")" = "$EXPECTED_SHA"
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ vars.AWS_INFRA_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: agent-comm-terraform-apply
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.15.8
      - name: Initialize Terraform
        working-directory: deploy/aws/terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"
      - name: Download exact plan from the private Terraform state bucket
        working-directory: deploy/aws/terraform
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          PLAN_RUN_ID: ${{ inputs.plan_run_id }}
        run: aws s3 cp "s3://${TF_STATE_BUCKET}/plans/${GITHUB_SHA}/${PLAN_RUN_ID}.tfplan" agent-comm.tfplan
      - name: Apply reviewed plan
        working-directory: deploy/aws/terraform
        run: terraform apply -input=false -auto-approve agent-comm.tfplan
      - name: Delete consumed plan
        if: success()
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          PLAN_RUN_ID: ${{ inputs.plan_run_id }}
        run: aws s3 rm "s3://${TF_STATE_BUCKET}/plans/${GITHUB_SHA}/${PLAN_RUN_ID}.tfplan"
      - name: Deployment outputs
        working-directory: deploy/aws/terraform
        run: terraform output >> "$GITHUB_STEP_SUMMARY"
