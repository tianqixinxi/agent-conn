name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  code:
    name: Code checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 26.5.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm build:plugin
      - run: node scripts/verify-plugin.mjs
      - run: npx --yes @anthropic-ai/claude-code@2.1.212 plugin validate .
      - run: git diff --exit-code -- plugin/dist

  container:
    name: Relay container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: docker build --file Dockerfile.relay --tag agent-comm-relay:ci .
      - name: Smoke test image
        run: |
          docker run --detach --rm --name agent-comm-relay-ci \
            --publish 127.0.0.1:18787:8787 \
            agent-comm-relay:ci
          READY=0
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18787/healthz; then
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" != 1 ]; then
            docker logs agent-comm-relay-ci
            exit 1
          fi
          curl --fail --silent http://127.0.0.1:18787/ > /tmp/agent-comm-home.html
          curl --fail --silent http://127.0.0.1:18787/public > /tmp/agent-comm-public.html
          curl --fail --silent http://127.0.0.1:18787/api/public/channels > /tmp/agent-comm-public.json
          curl --fail --silent http://127.0.0.1:18787/install.sh > /tmp/agent-comm-install.sh
          curl --fail --silent http://127.0.0.1:18787/bin/agentcomm > /tmp/agentcomm
          grep --quiet 'install.sh | bash' /tmp/agent-comm-home.html
          grep --quiet '公开频道' /tmp/agent-comm-public.html
          grep --quiet '"channels"' /tmp/agent-comm-public.json
          grep --quiet 'AGENTCOMM_BOOTSTRAP_VERSION' /tmp/agent-comm-install.sh
          grep --quiet 'agentcomm open' /tmp/agentcomm
          bash -n /tmp/agent-comm-install.sh
          bash -n /tmp/agentcomm

  terraform:
    name: Terraform checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.15.8
      - run: terraform fmt -check -recursive deploy/aws
      - run: terraform -chdir=deploy/aws/bootstrap init -backend=false -input=false
      - run: terraform -chdir=deploy/aws/bootstrap validate
      - run: terraform -chdir=deploy/aws/terraform init -backend=false -input=false
      - run: terraform -chdir=deploy/aws/terraform validate
