name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  code:
    name: Code checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint

  container:
    name: Relay container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: docker build --file Dockerfile.relay --tag agent-comm-relay:ci .
      - name: Smoke test image
        run: |
          docker run --detach --rm --name agent-comm-relay-ci \
            --publish 127.0.0.1:18787:8787 \
            agent-comm-relay:ci
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18787/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs agent-comm-relay-ci
          exit 1

  terraform:
    name: Terraform checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.15.8
      - run: terraform fmt -check -recursive deploy/aws
      - run: terraform -chdir=deploy/aws/bootstrap init -backend=false -input=false
      - run: terraform -chdir=deploy/aws/bootstrap validate
      - run: terraform -chdir=deploy/aws/terraform init -backend=false -input=false
      - run: terraform -chdir=deploy/aws/terraform validate
