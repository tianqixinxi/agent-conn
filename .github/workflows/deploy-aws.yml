name: Deploy relay to AWS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      action:
        description: Deploy the selected commit or roll back to the previous image
        required: true
        type: choice
        options:
          - deploy
          - rollback

permissions:
  contents: read

concurrency:
  group: agent-comm-production-release
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    if: github.event_name == 'push' || inputs.action == 'deploy'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint

  build:
    name: Build release image without production credentials
    needs: [verify]
    if: needs.verify.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: docker build --file Dockerfile.relay --tag "agent-comm-relay:${GITHUB_SHA}" .
      - run: docker save "agent-comm-relay:${GITHUB_SHA}" | gzip --best > relay-image.tar.gz
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: agent-comm-relay-image
          path: relay-image.tar.gz
          if-no-files-found: error
          retention-days: 2

  release:
    name: Release
    needs: [verify, build]
    if: always() && (inputs.action == 'rollback' || (needs.verify.result == 'success' && needs.build.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production-release
      url: https://${{ vars.AGENT_COMM_DOMAIN }}
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT: ${{ vars.AGENT_COMM_PROJECT }}
      ENVIRONMENT: ${{ vars.AGENT_COMM_ENVIRONMENT }}
      DOMAIN: ${{ vars.AGENT_COMM_DOMAIN }}
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        if: github.event_name == 'push' || inputs.action == 'deploy'
        with:
          name: agent-comm-relay-image
          path: release
      - name: Load verified release image
        if: github.event_name == 'push' || inputs.action == 'deploy'
        run: gunzip --stdout release/relay-image.tar.gz | docker load
      - uses: aws-actions/configure-aws-credentials@f79bc868ee9ca4687c7db10f05fe6a46cdcda892 # v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: agent-comm-release
      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        if: github.event_name == 'push' || inputs.action == 'deploy'

      - name: Resolve deployment target
        id: target
        run: |
          REPOSITORY="$PROJECT-$ENVIRONMENT-relay"
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=$PROJECT" \
              "Name=tag:Environment,Values=$ENVIRONMENT" \
              "Name=tag:Role,Values=relay" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$(wc -w <<<"$INSTANCE_ID")" -ne 1 ]; then
            echo "expected exactly one running relay instance, got: $INSTANCE_ID" >&2
            exit 1
          fi
          echo "repository=$REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Push immutable image
        id: image
        if: github.event_name == 'push' || inputs.action == 'deploy'
        env:
          REPOSITORY: ${{ steps.target.outputs.repository }}
        run: |
          REPOSITORY_URI=$(aws ecr describe-repositories \
            --repository-names "$REPOSITORY" \
            --query 'repositories[0].repositoryUri' \
            --output text)
          IMAGE="$REPOSITORY_URI:${GITHUB_SHA}"
          if ! aws ecr describe-images \
            --repository-name "$REPOSITORY" \
            --image-ids "imageTag=${GITHUB_SHA}" >/dev/null 2>&1; then
            docker tag "agent-comm-relay:${GITHUB_SHA}" "$IMAGE"
            docker push "$IMAGE"
          fi
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy through Systems Manager
        env:
          INSTANCE_ID: ${{ steps.target.outputs.instance_id }}
          IMAGE: ${{ steps.image.outputs.uri }}
          ACTION: ${{ inputs.action }}
        run: |
          ACTION=${ACTION:-deploy}
          if [ "$ACTION" = "rollback" ]; then
            REMOTE_COMMAND="sudo /opt/agent-comm/bin/rollback"
          else
            REMOTE_COMMAND="sudo /opt/agent-comm/bin/deploy '$IMAGE'"
          fi
          PARAMETERS=$(jq -cn --arg command "$REMOTE_COMMAND" '{commands:[$command]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "AgentComm $ACTION from GitHub ${GITHUB_RUN_ID}" \
            --parameters "$PARAMETERS" \
            --query 'Command.CommandId' \
            --output text)

          STATUS=""
          for _ in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query Status \
              --output text 2>/dev/null || true)
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut|Cancelling) break ;;
            esac
            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}'
          test "$STATUS" = "Success"

      - name: Public smoke test
        run: |
          for _ in $(seq 1 24); do
            if curl --fail --silent --show-error "https://$DOMAIN/healthz"; then
              echo >> "$GITHUB_STEP_SUMMARY"
              echo "Deployed and verified https://$DOMAIN/healthz" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            sleep 5
          done
          exit 1
